# configs/agent/rnd_dqn.yaml
# Hydra configuration for RNDDQNAgent training.

env:
  name: CartPole-v1

seed: 0

agent:
  buffer_capacity: 10000
  batch_size: 32
  learning_rate: 0.001
  gamma: 0.99
  epsilon_start: 1.0
  epsilon_final: 0.01
  epsilon_decay: 500
  target_update_freq: 1000

rnd:
  hidden_size: 128
  n_layers: 2
  learning_rate: 1e-3   # optimizer lr for the RND predictor
  update_freq: 1000     # update RND predictor every N steps
  reward_weight: 0.1    # scale factor applied to raw RND error before adding to reward

train:
  num_frames: 20000
  eval_interval: 1000
